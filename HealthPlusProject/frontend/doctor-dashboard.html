<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Health Plus - Doctor Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(135deg,#0a192f,#112240,#0f3057);
color:#e6f1ff;
}

.navbar{
background:#0a192f;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(0,224,255,0.2);
}

.logo{font-size:22px;font-weight:bold;}
.logo span{color:#00e0ff;}

.nav-right{display:flex;gap:20px;align-items:center;}

.logout-btn{
background:#00e0ff;
color:#0a192f;
border:none;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.dashboard{display:flex;height:calc(100vh - 70px);}

.sidebar{
width:250px;
background:#112240;
padding:20px;
border-right:1px solid rgba(0,224,255,0.2);
}

.menu-item{
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.menu-item:hover{
background:rgba(0,224,255,0.15);
}

.content{flex:1;padding:30px;overflow-y:auto;}

.card{
background:#112240;
padding:20px;
border-radius:12px;
margin-bottom:15px;
border:1px solid rgba(0,224,255,0.15);
}

.complete-btn{
margin-top:10px;
padding:6px 12px;
background:#00e0ff;
color:#0a192f;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.section-title{
margin-bottom:20px;
font-size:20px;
color:#00e0ff;
}
</style>

<script>

// 🔐 LOAD DOCTOR + SECURITY CHECK
function loadDoctor(){

let name = localStorage.getItem("username");
let role = localStorage.getItem("role");

if(!name || role !== "Doctor"){
alert("Access Denied! Please login as Doctor.");
window.location="login.html";
return;
}

// Generate Doctor ID if not exists
let id = localStorage.getItem("doctorId");
if(!id){
id = "DOC" + Math.floor(Math.random()*10000);
localStorage.setItem("doctorId",id);
}

document.getElementById("doctorName").innerText = name;
document.getElementById("doctorId").innerText = id;

showSection("view");
}


// Appointment Helpers
function getAppointments(){
return JSON.parse(localStorage.getItem("appointments")) || [];
}

function saveAppointments(data){
localStorage.setItem("appointments", JSON.stringify(data));
}


// MAIN SECTION HANDLER
function showSection(type){

let content = document.getElementById("content");
content.innerHTML = "";

let appointments = getAppointments();
let doctor = localStorage.getItem("username");

let title = "";
let found = false;


// ✅ VIEW (Pending)
if(type==="view"){
title="Pending Appointments";

appointments.forEach((a,i)=>{
if(a.doctor === doctor && a.status === "Pending"){
found = true;
content.innerHTML += createCard(a,i,true);
}
});
}


// ✅ COMPLETED
if(type==="completed"){
title="Completed Appointments";

appointments.forEach((a,i)=>{
if(a.doctor === doctor && a.status === "Completed"){
found = true;
content.innerHTML += createCard(a,i,false);
}
});
}


// ✅ HISTORY
if(type==="history"){
title="Appointment History";

appointments.forEach((a,i)=>{
if(a.doctor === doctor){
found = true;
content.innerHTML += createCard(a,i,false);
}
});
}


// If no data found
if(!found){
content.innerHTML = "<p>No Appointments Found</p>";
}

// Add Title on top
content.innerHTML = "<div class='section-title'>"+title+"</div>" + content.innerHTML;
}


// CARD TEMPLATE
function createCard(a,index,showBtn){
return `
<div class="card">
<h4>Patient: ${a.patient}</h4>
<p>Date: ${a.date}</p>
<p>Time: ${a.time}</p>
<p>Status: ${a.status}</p>
${showBtn ? `<button class="complete-btn" onclick="markComplete(${index})">Mark as Complete</button>` : ""}
</div>
`;
}


// MARK COMPLETE
function markComplete(index){

let appointments = getAppointments();

appointments[index].status = "Completed";

saveAppointments(appointments);

showSection("view");
}


// LOGOUT
function logout(){
localStorage.removeItem("username");
localStorage.removeItem("role");
window.location="login.html";
}

</script>
</head>

<body onload="loadDoctor()">

<div class="navbar">
<div class="logo">Health <span>Plus</span></div>
<div class="nav-right">
<div>Name: <span id="doctorName"></span></div>
<div>ID: <span id="doctorId"></span></div>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard">
<div class="sidebar">
<div class="menu-item" onclick="showSection('view')">View Appointments</div>
<div class="menu-item" onclick="showSection('completed')">Completed Appointments</div>
<div class="menu-item" onclick="showSection('history')">Appointment History</div>
</div>
<div class="content" id="content"></div>
</div>

</body>
</html>
