<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Health Plus - Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url('https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    max-height:95vh;
    overflow-y:auto;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    color:white;
}

.container h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input,
.input-box select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    outline:none;
}

.gender{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:14px;
}

#doctordetails{
    display:none;
    margin-top:10px;
    padding:10px;
    border:1px solid rgba(255,255,255,0.3);
    border-radius:10px;
}

.register-btn{
    width:100%;
    padding:12px;
    background:#0077b6;
    border:none;
    border-radius:25px;
    margin-top:15px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    color:#00d4ff;
    text-decoration:none;
}
</style>

<script>

// Show/Hide Doctor Fields
function toggleDoctorFields(){
    const role = document.getElementById("role").value;
    const doctorBox = document.getElementById("doctordetails");

    doctorBox.style.display = role === "Doctor" ? "block" : "none";
}

// Register Function (UPDATED)
function registerUser(){

    const name = document.getElementById("name").value.trim();
    const contact = document.getElementById("contact").value.trim();
    const email = document.getElementById("email").value.trim();
    const dob = document.getElementById("dob").value;
    const role = document.getElementById("role").value;

    const gender = document.querySelector('input[name="gender"]:checked');

    if(name === "" || contact === "" || email === "" || !gender){
        alert("Please fill all required fields");
        return;
    }

    let data = {
        name: name,
        contact: contact,
        email: email,
        dob: dob,
        gender: gender.value,
        role: role
    };

    if(role === "Doctor"){
        const experience = document.getElementById("experience").value;
        const specialization = document.getElementById("specialization").value;
        const qualification = document.getElementById("qualification").value;
        const clinic = document.getElementById("clinic").value;

        if(experience === "" || specialization === ""){
            alert("Doctor must fill specialization & experience");
            return;
        }

        data.experience = experience;
        data.specialization = specialization;
        data.qualification = qualification;
        data.clinic = clinic;
    }

    // ✅ UPDATED FETCH (NO localhost)
    fetch("/register",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    })
    .then(response=>{
        if(!response.ok){
            throw new Error("Network response not ok");
        }
        return response.text();
    })
    .then(result=>{

    // ✅ ADD THIS CODE HERE
    let doctors = JSON.parse(localStorage.getItem("registeredDoctors")) || [];

    if(data.role === "Doctor"){
        doctors.push(data);
        localStorage.setItem("registeredDoctors", JSON.stringify(doctors));
    }

    alert(result);
    window.location.href = "login.html";
})
    .catch(error=>{
        console.error("Error:",error);
        alert("Server Error ❌");
    });
}
</script>
</head>

<body>

<div class="container">
    <h2>Health Plus Registration</h2>

    <div class="input-box">
        <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-box">
        <input type="text" id="contact" placeholder="Contact Number">
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="date" id="dob">
    </div>

    <div class="input-box">
        <div class="gender">
            <label><input type="radio" name="gender" value="Male"> Male</label>
            <label><input type="radio" name="gender" value="Female"> Female</label>
            <label><input type="radio" name="gender" value="Transgender"> Transgender</label>
        </div>
    </div>

    <div class="input-box">
        <select id="role" onchange="toggleDoctorFields()">
            <option value="Patient">Patient</option>
            <option value="Doctor">Doctor</option>
        </select>
    </div>

    <div id="doctordetails">
        <div class="input-box">
            <input type="number" id="experience" placeholder="Experience (Years)">
        </div>

        <div class="input-box">
            <input type="text" id="specialization" placeholder="Specialization">
        </div>

        <div class="input-box">
            <input type="text" id="qualification" placeholder="Qualification">
        </div>

        <div class="input-box">
            <input type="text" id="clinic" placeholder="Clinic / Hospital Name">
        </div>
    </div>

    <button class="register-btn" onclick="registerUser()">Register</button>

    <div class="login-link">
        Already have account? <a href="login.html">Login</a>
    </div>

</div>

</body>
</html>
