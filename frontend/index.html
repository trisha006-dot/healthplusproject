<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Health Plus - Online Doctor Appointment</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    height:100vh;
    color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.nav-links a{
    text-decoration:none;
    color:white;
    margin-left:20px;
    padding:8px 18px;
    border-radius:20px;
    transition:0.3s;
    border:1px solid #00b4d8;
}

.nav-links a:hover{
    background:#00b4d8;
}

/* Hero Section */

.hero{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.hero h1{
    font-size:50px;
    margin-bottom:20px;
    animation: fadeIn 1.5s ease-in-out;
}

.hero p{
    font-size:20px;
    width:60%;
    margin-bottom:30px;
    line-height:1.6;
    animation: fadeIn 2s ease-in-out;
}

.hero-buttons a{
    text-decoration:none;
    padding:12px 25px;
    margin:10px;
    border-radius:30px;
    background:#00b4d8;
    color:white;
    font-weight:bold;
    transition:0.3s;
    cursor:pointer;
    display:inline-block;
}

.hero-buttons a:hover{
    background:#0077b6;
    transform: scale(1.05);
}

/* Animation */

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Health Plus</div>

    <div class="nav-links">
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Your Health, Our Priority</h1>
    <p>
        Book appointments with trusted doctors anytime, anywhere. 
        Fast, secure and hassle-free medical consultation platform.
    </p>

    <div class="hero-buttons">
        <a href="register.html">Get Started</a>
        <a href="login.html">Book Appointment</a>
    </div>
</div>

</body>
</html>
